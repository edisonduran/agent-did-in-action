<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f14"/>
      <stop offset="1" stop-color="#111821"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Iso floor decoration -->
  <g transform="translate(70 380)" opacity="0.55">
    <polygon points="0,0 60,30 0,60 -60,30" fill="#1f2a37" stroke="#0b0f14"/>
    <polygon points="120,0 180,30 120,60 60,30" fill="#141c25" stroke="#0b0f14"/>
    <polygon points="240,0 300,30 240,60 180,30" fill="#1f2a37" stroke="#0b0f14"/>
    <polygon points="60,60 120,90 60,120 0,90" fill="#141c25" stroke="#0b0f14"/>
    <polygon points="180,60 240,90 180,120 120,90" fill="#1f2a37" stroke="#0b0f14"/>
    <polygon points="120,120 180,150 120,180 60,150" fill="#141c25" stroke="#0b0f14"/>
  </g>

  <!-- Logo badge -->
  <g transform="translate(70 70)">
    <rect width="72" height="72" rx="12" fill="#22d3ee"/>
    <text x="36" y="48" font-family="ui-monospace, SFMono-Regular, monospace" font-size="26" font-weight="800" text-anchor="middle" fill="#0b0f14">DID</text>
  </g>
  <text x="170" y="105" font-family="ui-monospace, monospace" font-size="22" fill="#22d3ee">agent-did-in-action</text>
  <text x="170" y="135" font-family="ui-sans-serif, system-ui" font-size="18" fill="#64748b">live demo · @agentdid/sdk 0.2.0</text>

  <!-- Hero copy -->
  <text x="70" y="240" font-family="ui-sans-serif, system-ui" font-size="58" font-weight="800" fill="#e5e7eb">Watch AI agents</text>
  <text x="70" y="310" font-family="ui-sans-serif, system-ui" font-size="58" font-weight="800" fill="url(#accent)">prove who they are.</text>

  <text x="70" y="365" font-family="ui-sans-serif, system-ui" font-size="22" fill="#94a3b8">Real Ed25519 signatures. Real verification. Tampered handoffs blocked in your browser.</text>

  <!-- Verified / Blocked badges -->
  <g transform="translate(800 460)">
    <circle r="40" fill="#22c55e"/>
    <text font-family="system-ui" font-size="48" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#0b0f14" y="6">✓</text>
    <text x="0" y="80" font-family="ui-monospace, monospace" font-size="14" text-anchor="middle" fill="#22c55e">verified</text>
  </g>
  <g transform="translate(950 460)">
    <circle r="40" fill="#ef4444"/>
    <text font-family="system-ui" font-size="48" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#0b0f14" y="6">✗</text>
    <text x="0" y="80" font-family="ui-monospace, monospace" font-size="14" text-anchor="middle" fill="#ef4444">blocked</text>
  </g>
  <g transform="translate(1100 460)">
    <circle r="40" fill="#22d3ee"/>
    <text font-family="system-ui" font-size="42" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="#0b0f14" y="6">✍</text>
    <text x="0" y="80" font-family="ui-monospace, monospace" font-size="14" text-anchor="middle" fill="#22d3ee">signed</text>
  </g>

  <text x="70" y="585" font-family="ui-monospace, monospace" font-size="14" fill="#475569">Apache-2.0 · agent-did.dev · github.com/edisonduran/agent-did</text>
</svg>
