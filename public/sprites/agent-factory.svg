<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Factory: building with two chimneys and a sawtooth roof -->
  <ellipse cx="40" cy="76" rx="32" ry="3" fill="#000" opacity="0.25"/>
  <!-- Main hall -->
  <rect x="10" y="36" width="60" height="36" fill="#475569" stroke="#1e293b" stroke-width="2"/>
  <!-- Sawtooth roof -->
  <path d="M10 36 L20 28 L20 36 L30 28 L30 36 L40 28 L40 36 L50 28 L50 36 L60 28 L60 36 L70 28 L70 36 Z" fill="#334155" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Chimney left -->
  <rect x="16" y="14" width="8" height="22" fill="#64748b" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="14" y="12" width="12" height="3" fill="#1e293b"/>
  <!-- Smoke -->
  <circle cx="20" cy="9" r="3" fill="#cbd5e1" opacity="0.8"/>
  <circle cx="24" cy="5" r="2.5" fill="#cbd5e1" opacity="0.6"/>
  <!-- Chimney right -->
  <rect x="56" y="18" width="6" height="18" fill="#64748b" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="54" y="16" width="10" height="3" fill="#1e293b"/>
  <circle cx="59" cy="13" r="2" fill="#cbd5e1" opacity="0.7"/>
  <!-- Door -->
  <rect x="34" y="54" width="12" height="18" fill="#0f172a"/>
  <rect x="34" y="54" width="12" height="4" fill="#fbbf24"/>
  <!-- Windows -->
  <rect x="14" y="42" width="10" height="6" fill="#fbbf24" opacity="0.85"/>
  <rect x="56" y="42" width="10" height="6" fill="#fbbf24" opacity="0.85"/>
  <!-- Sign -->
  <text x="40" y="50" text-anchor="middle" font-family="monospace" font-size="6" fill="#f1f5f9" font-weight="bold">FACTORY</text>
</svg>
