name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run lint

      - name: Validate community demo manifests
        run: npm run validate:demos

      - name: Unit tests
        run: npm test -- --run

      - name: Smoke test (Node side, real SDK)
        run: npm run smoke

      - name: Build
        run: npm run build

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      - name: E2E smoke (Playwright · Chromium)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
